name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        # Skip cleanly when no compiled tests exist yet — the suite arrives
        # in a later unit; the npm `test` script (`node --test dist/test/`)
        # otherwise hard-fails with "Could not find 'dist/test/'".
        run: |
          if [ -d dist/test ] && find dist/test -name '*.js' -type f | grep -q .; then
            npm test
          else
            echo "No compiled tests in dist/test/ — skipping until the suite lands."
          fi

  zero-python-install:
    name: Zero-Python install (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    # Decision B: the zero-Python guarantee is that `better-sqlite3` installs
    # from a prebuilt for the pinned ABIs — never falling back to node-gyp,
    # which needs Python. Masking Python (npm_config_python / PYTHON → a bad
    # path) makes a node-gyp fallback FAIL loudly instead of silently
    # succeeding on the runner's system Python. The runtime smoke test can't
    # catch this; the install must.
    env:
      npm_config_python: /nonexistent
      PYTHON: /nonexistent

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install (prebuilt-only — no Python for node-gyp)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zero-Python smoke + install-time assertion
        env:
          ZERO_PYTHON_INSTALL_CHECK: "1"
        run: |
          if [ -d dist/test ] && find dist/test -name '*.js' -type f | grep -q .; then
            npm test
          else
            echo "No compiled tests in dist/test/ — skipping."
          fi

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [typecheck, test, zero-python-install]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distribution
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
          retention-days: 7
