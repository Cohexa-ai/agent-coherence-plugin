version: 2
updates:
  # Node dependencies (build/dev tooling — the plugin coordinator itself ships
  # locked deps via package-lock.json. Bumps target the default branch (main);
  # dev is a mirror of main, and a dev target produced duplicate PRs when the
  # two lines diverged (security updates always go to the default branch).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"

  # GitHub Actions workflow versions (ci.yml + release.yml).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
